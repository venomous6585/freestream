 transform: translateY(-5px); box-shadow: 0 10px 25px rgba(229,9,20,0.3); }        .movie-poster { width: 100%; height: 300px; object-fit: cover; }        .movie-info { padding: 1rem; }        .movie-title { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }        .movie-year { color: #ccc; font-size: 0.8rem; }        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }        .player-modal.active { display: flex; align-items: center; justify-content: center; }        .video-player { width: 90%; max-width: 1200px; max-height: 90vh; background: #000; border-radius: 10px; }        .close-btn { position: absolute; top: 20px; right: 20px; background: #e50914; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; z-index: 1001; }        @media (max-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } .search { width: 95%; } }    </style></head><body>    <div class="header">        <h1>?? FreeStream</h1>        <input type="text" class="search" placeholder="Search movies & series..." id="searchInput">    </div>    <div class="container">        <div class="section">            <h2>?? Trending Now</h2>            <div class="grid" id="trending"></div>        </div>        <div class="section">            <h2>?? Movies</h2>            <div class="grid" id="movies"></div>        </div>        <div class="section">            <h2>?? Series</h2>            <div class="grid" id="series"></div>        </div>    </div>    <div class="player-modal" id="playerModal">        <button class="close-btn" id="closeBtn">×</button>        <video class="video-player" controls id="videoPlayer" style="width: 100%; height: auto;"></video>    </div>    <script>        // Sample movie/series data (FREE PUBLIC DOMAIN & OPEN SOURCES)        const content = {            trending: [                {title: "The Great Dictator", year: "1940", poster: "https://images.unsplash.com/photo-1489599156632-7f46b7d6a287?w=300&h=450&fit=crop", video: "https://archive.org/download/The.Great.Dictator.1940.1080p.BluRay.x264.YIFY/The.Great.Dictator.1940.1080p.BluRay.x264.YIFY.mp4"},                {title: "Night of the Living Dead", year: "1968", poster: "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=300&h=450&fit=crop", video: "https://ia800209.us.archive.org/29/items/night_of_the_living_dead/Night_of_the_Living_Dead.mp4"},                {title: "Metropolis", year: "1927", poster: "https://images.unsplash.com/photo-1571896349840-0a4a549b550a?w=300&h=450&fit=crop", video: "https://archive.org/download/Metropolis_201711/Metropolis.mp4"},                {title: "The Kid", year: "1921", poster: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=450&fit=crop", video: "https://archive.org/download/CharlieChaplin-TheKid1921/CharlieChaplin-TheKid1921.mp4"}            ],            movies: [                {title: "Nosferatu", year: "1922", poster: "https://images.unsplash.com/photo-1534665482403-a909b0dff5ef?w=300&h=450&fit=crop", video: "https://archive.org/download/Nosferatu1922/Nosferatu1922.mp4"},                {title: "The Cabinet of Dr. Caligari", year: "1920", poster: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=300&h=450&fit=crop", video: "https://archive.org/download/The.Cabinet.of.Dr.Caligari.1920.The.Cabinet.of.Dr._Caligari.mp4"},                {title: "Battleship Potemkin", year: "1925", poster: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&h=450&fit=crop", video: "https://archive.org/download/Battleship_Potemkin_20110819/Battleship%20Potemkin.mp4"},                {title: "Intolerance", year: "1916", poster: "https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=300&h=450&fit=crop", video: "https://archive.org/download/Intolerance1916/Intolerance1916.mp4"},                {title: "The Birth of a Nation", year: "1915", poster: "https://images.unsplash.com/photo-1489599156632-7f46b7d6a287?w=300&h=450&fit=crop", video: "https://archive.org/download/BirthOfANation/BirthOfANation.mp4"}            ],            series: [                {title: "Sherlock Holmes", year: "1965", poster: "https://images.unsplash.com/photo-1612810803955-2d47211d0dda?w=300&h=450&fit=crop", video: "https://archive.org/download/SherlockHolmes1965/SherlockHolmes1965.mp4"},                {title: "The Avengers", year: "1961", poster: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=450&fit=crop", video: "https://archive.org/download/TheAvengers1961/TheAvengers1961.mp4"},                {title: "Doctor Who Classic", year: "1963", poster: "https://images.unsplash.com/photo-1489599156632-7f46b7d6a287?w=300&h=450&fit=crop", video: "https://archive.org/download/DoctorWho1963/DoctorWho1963.mp4"}            ]        };        // Initialize app        function init() {            renderContent('trending', content.trending);            renderContent('movies', content.movies);            renderContent('series', content.series);            setupEventListeners();        }        function renderContent(containerId, items) {            const container = document.getElementById(containerId);            container.innerHTML = items.map(item => `                <div class="movie-card" onclick="playVideo('${item.video}', '${item.title}')">                    <img src="${item.poster}" alt="${item.title}" class="movie-poster" loading="lazy">                    <div class="movie-info">                        <div class="movie-title">${item.title}</div>                        <div class="movie-year">${item.year}</div>                    </div>                </div>            `).join('');        }        function setupEventListeners() {            document.getElementById('searchInput').addEventListener('input', function(e) {                const searchTerm = e.target.value.toLowerCase();                document.querySelectorAll('.movie-card').forEach(card => {                    const title = card.querySelector('.movie-title').textContent.toLowerCase();                    card.style.display = title.includes(searchTerm) ? 'block' : 'none';                });            });            document.getElementById('closeBtn').onclick = closePlayer;            document.getElementById('playerModal').onclick = function(e) {                if (e.target === this) closePlayer();            };        }        function playVideo(videoSrc, title) {            const modal = document.getElementById('playerModal');            const player = document.getElementById('videoPlayer');            player.src = videoSrc;            document.title = `${title} - FreeStream`;            modal.classList.add('active');            player.play();        }        function closePlayer() {            const modal = document.getElementById('playerModal');            const player = document.getElementById('videoPlayer');            modal.classList.remove('active');            player.pause();            player.src = '';            document.title = 'FreeStream - Movies & Series';        }        // PWA Install Prompt        let deferredPrompt;        window.addEventListener('beforeinstallprompt', (e) => {            deferredPrompt = e;        });        // Service Worker for offline (optional)        if ('serviceWorker' in navigator) {            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`                self.addEventListener('fetch', e => {                    e.respondWith(fetch(e.request));                });            `));        }        init();    </script></body></html>
